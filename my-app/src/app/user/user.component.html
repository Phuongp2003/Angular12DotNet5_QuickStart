<h2>Department management</h2>

<div class="container">
  <div id="department-table" class="ex-table">
    <div class="ex-table_row">
      <div class="ex-table_row-item w-10">Avatar</div>
      <div class="ex-table_row-item w-10">Id</div>
      <div class="ex-table_row-item w-45">Name</div>
      <div class="ex-table_row-item w-15">Size</div>
      <div class="ex-table_row-item w-20">Action</div>
    </div>
    <div class="ex-table_row" *ngFor="let em of employees">
      <div class="ex-table_row-item w-10">{{em.Avatar}}</div>
      <div class="ex-table_row-item w-10">{{em.UserId}}</div>
      <div class="ex-table_row-item w-45">{{em.FullName}}</div>
      <div class="ex-table_row-item w-15">{{em.DateOfBirth}}</div>
      <div class="ex-table_row-item w-20">
        <button class="ex-table_action-btn" title="Edit department">
          <svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" viewBox="0 0 36 36"><!-- Icon from Clarity by VMware - https://github.com/vmware/clarity-assets/blob/master/LICENSE --><path fill="currentColor" d="m4.22 23.2l-1.9 8.2a2.06 2.06 0 0 0 2 2.5a2 2 0 0 0 .43 0L13 32l15.84-15.78L20 7.4Z" class="clr-i-solid clr-i-solid-path-1"/><path fill="currentColor" d="m33.82 8.32l-5.9-5.9a2.07 2.07 0 0 0-2.92 0L21.72 5.7l8.83 8.83l3.28-3.28a2.07 2.07 0 0 0-.01-2.93" class="clr-i-solid clr-i-solid-path-2"/><path fill="none" d="M0 0h36v36H0z"/></svg>
        </button>
        <button class="ex-table_action-btn" title="Remove department">
          <svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" viewBox="0 0 36 36"><!-- Icon from Clarity by VMware - https://github.com/vmware/clarity-assets/blob/master/LICENSE --><path fill="currentColor" d="M6 9v22a2.93 2.93 0 0 0 2.86 3h18.23A2.93 2.93 0 0 0 30 31V9Zm9 20h-2V14h2Zm8 0h-2V14h2Z" class="clr-i-solid clr-i-solid-path-1"/><path fill="currentColor" d="M30.73 5H23V4a2 2 0 0 0-2-2h-6.2A2 2 0 0 0 13 4v1H5a1 1 0 1 0 0 2h25.73a1 1 0 0 0 0-2" class="clr-i-solid clr-i-solid-path-2"/><path fill="none" d="M0 0h36v36H0z"/></svg>
        </button>
        <button class="ex-table_action-btn" title="Show department employees">
          <svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" viewBox="0 0 36 36"><!-- Icon from Clarity by VMware - https://github.com/vmware/clarity-assets/blob/master/LICENSE --><path fill="currentColor" d="M33.62 17.53c-3.37-6.23-9.28-10-15.82-10S5.34 11.3 2 17.53l-.28.47l.26.48c3.37 6.23 9.28 10 15.82 10s12.46-3.72 15.82-10l.26-.48Zm-15.82 8.9C12.17 26.43 7 23.29 4 18c3-5.29 8.17-8.43 13.8-8.43S28.54 12.72 31.59 18c-3.05 5.29-8.17 8.43-13.79 8.43" class="clr-i-solid clr-i-solid-path-1"/><circle cx="18.09" cy="18.03" r="6.86" fill="currentColor" class="clr-i-solid clr-i-solid-path-2"/><path fill="none" d="M0 0h36v36H0z"/></svg>
        </button>
      </div>
    </div>
  </div>
</div>
